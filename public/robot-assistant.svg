<!-- public/robot-assistant.svg -->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ambient glows -->
    <radialGradient id="glowViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(344 168) rotate(122) scale(240 240)">
      <stop stop-color="#A78BFA" stop-opacity="0.55"/>
      <stop offset="0.65" stop-color="#A78BFA" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowTeal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(396 324) rotate(135) scale(260 260)">
      <stop stop-color="#14B8A6" stop-opacity="0.34"/>
      <stop offset="0.72" stop-color="#14B8A6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowMint" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(292 390) rotate(135) scale(220 220)">
      <stop stop-color="#34D399" stop-opacity="0.22"/>
      <stop offset="0.75" stop-color="#34D399" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass gradients -->
    <linearGradient id="glassBody" x1="206" y1="240" x2="318" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.30"/>
    </linearGradient>

    <linearGradient id="glassHelmet" x1="170" y1="92" x2="348" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.28"/>
    </linearGradient>

    <linearGradient id="visor" x1="206" y1="132" x2="326" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B2B2C"/>
      <stop offset="1" stop-color="#113C3E"/>
    </linearGradient>

    <radialGradient id="visorShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(242 152) rotate(120) scale(90 90)">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.7" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="earGlass" x1="160" y1="150" x2="190" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.28"/>
    </linearGradient>

    <linearGradient id="earGlassR" x1="352" y1="150" x2="322" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.28"/>
    </linearGradient>

    <linearGradient id="mintStroke" x1="210" y1="290" x2="312" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>

    <filter id="tinyGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow blobs -->
  <path d="M0 0H512V512H0V0Z" fill="url(#glowViolet)"/>
  <path d="M0 0H512V512H0V0Z" fill="url(#glowTeal)"/>
  <path d="M0 0H512V512H0V0Z" fill="url(#glowMint)"/>

  <!-- Robot group -->
  <g filter="url(#softShadow)">

    <!-- Outer halo / helmet ring -->
    <path d="M256 88C188 88 144 137 144 202C144 256 174 303 219 323C231 328 243 331 256 331C269 331 281 328 293 323C338 303 368 256 368 202C368 137 324 88 256 88Z"
          fill="url(#glassHelmet)"
          stroke="rgba(148,163,184,0.35)"
          stroke-width="2"/>

    <!-- Ears -->
    <path d="M138 179C138 161 152 147 170 147H188C198 147 206 155 206 165V239C206 249 198 257 188 257H170C152 257 138 243 138 225V179Z"
          fill="url(#earGlass)"
          stroke="rgba(148,163,184,0.30)"
          stroke-width="2"/>

    <path d="M374 179C374 161 360 147 342 147H324C314 147 306 155 306 165V239C306 249 314 257 324 257H342C360 257 374 243 374 225V179Z"
          fill="url(#earGlassR)"
          stroke="rgba(148,163,184,0.30)"
          stroke-width="2"/>

    <!-- Visor base -->
    <path d="M204 130C204 115 216 103 231 103H325C353 103 376 126 376 154V212C376 240 353 263 325 263H231C216 263 204 251 204 236V130Z"
          fill="url(#visor)"
          stroke="rgba(15,23,42,0.22)"
          stroke-width="3"/>

    <!-- Visor shine -->
    <path d="M215 133C230 114 258 105 295 105C317 105 340 112 358 126C341 120 320 118 299 121C266 125 239 142 226 163C219 174 215 187 214 202C211 186 206 148 215 133Z"
          fill="url(#visorShine)"/>

    <!-- Eyes -->
    <g filter="url(#tinyGlow)">
      <circle cx="252" cy="175" r="9" fill="#7CF8EA"/>
      <circle cx="326" cy="175" r="9" fill="#7CF8EA"/>
    </g>

    <!-- Smile -->
    <path d="M270 210C282 222 300 226 318 221"
          stroke="#7CF8EA"
          stroke-width="7"
          stroke-linecap="round"/>

    <!-- Body capsule -->
    <path d="M188 264C188 242 206 224 228 224H284C306 224 324 242 324 264V378C324 420 290 454 248 454H264C222 454 188 420 188 378V264Z"
          fill="url(#glassBody)"
          stroke="url(#mintStroke)"
          stroke-width="2"/>

    <!-- Chest lines -->
    <path d="M224 318H288" stroke="rgba(20,184,166,0.30)" stroke-width="8" stroke-linecap="round"/>
    <path d="M224 350H288" stroke="rgba(167,139,250,0.22)" stroke-width="8" stroke-linecap="round"/>
    <path d="M232 382H280" stroke="rgba(20,184,166,0.20)" stroke-width="8" stroke-linecap="round"/>

    <!-- Small highlight on body -->
    <path d="M212 266C216 246 234 234 252 234H288C304 234 317 244 321 259C309 248 294 244 277 246H248C232 247 219 254 212 266Z"
          fill="rgba(255,255,255,0.18)"/>
  </g>

  <!-- Outer soft cast shadow blob (like reference) -->
  <ellipse cx="360" cy="380" rx="108" ry="82" fill="rgba(20,184,166,0.10)"/>
</svg>
